name: Android Build and Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;29.0.14206865"

      - name: Decode keystore
        run: |
          mkdir -p ${{ github.workspace }}/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore/syncplaykey.jks

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          yuroyami.keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          yuroyami.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          yuroyami.storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EOF

      - name: Build Android App Bundle (AAB)
        run: ./gradlew bundleFullRelease

      - name: Upload to Google Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.yuroyami.syncplay
          releaseFiles: androidApp/build/outputs/bundle/fullRelease/androidApp-fullRelease.aab
          track: beta
          status: completed
