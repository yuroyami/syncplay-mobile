name: Release

on:
  workflow_dispatch:
    inputs:
      deploy_play_store:
        description: 'Upload AAB to Google Play Store (beta)'
        type: boolean
        default: true
      deploy_app_store:
        description: 'Upload IPA to App Store / TestFlight'
        type: boolean
        default: true

permissions:
  contents: write

env:
  # Skip `brew update` — slow and rarely needed since the macos runner image
  # ships current Homebrew + a recent formula snapshot.
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  # Gradle daemon adds overhead in single-invocation CI steps.
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Android Full Build (exoOnly=false) → 4 ABI APKs + 1 universal + 1 AAB
  # ───────────────────────────────────────────────────────────────────────────
  build-android-full:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          # versionName lives in the kmpSsot { } block in the root build script,
          # not in AppConfig.kt (the plugin owns it — see AppConfig.kt header comment).
          VERSION=$(grep -E '^[[:space:]]+versionName[[:space:]]*=' build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract versionName from build.gradle.kts" >&2
            exit 1
          fi
          VERSION_CODE=$(python3 -c "v='$VERSION'.split('.'); print('1' + ''.join(s.zfill(3) for s in v))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (code: $VERSION_CODE)"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      # NDK is ~1GB and rarely changes (pinned in gradle.properties).
      # Skip the install on cache hit.
      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
          key: android-ndk-29.0.14206865-${{ runner.os }}

      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;29.0.14206865"

      # Gradle dependency cache + Gradle build cache + wrapper distribution.
      # Saves the dependency-download phase (~2-3 min on cold start).
      - uses: gradle/actions/setup-gradle@v4

      # Native MPV build (FFmpeg, libass, harfbuzz, freetype, mbedtls, dav1d,
      # libplacebo, lua, fribidi, unibreak) cross-compiled for 4 ABIs.
      # When the cache hits, NativeBuildConfig's `onlyIf` short-circuits the
      # Exec task because all output libs are already on disk.
      #
      # Key inputs: every build script under buildscripts/ (depinfo.sh pins
      # dep versions; per-lib scripts in scripts/ control build flags) plus
      # gradle.properties (NDK version) plus the AppConfig lib list.
      - name: Cache MPV native libs
        id: mpv-cache
        uses: actions/cache@v4
        with:
          path: androidApp/src/main/libs
          key: mpv-libs-${{ runner.os }}-${{ hashFiles('buildscripts/mpv_*.sh', 'buildscripts/include/*.sh', 'buildscripts/scripts/*.sh', 'gradle.properties', 'buildSrc/src/main/kotlin/AppConfig.kt') }}

      # Required by the MPV build chain. Skipped entirely when MPV libs are
      # cached — no need to bootstrap the toolchain for a no-op task.
      - name: Install native build dependencies
        if: steps.mpv-cache.outputs.cache-hit != 'true'
        run: brew install automake autoconf libtool pkg-config nasm meson

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore/syncplaykey.jks

      - name: Create local.properties
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          keystore.keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keystore.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keystore.storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          yuroyami.keyKlipyApi=${{ secrets.KLIPY_API_KEY }}
          EOF

      - name: Ensure release configuration
        run: |
          # exoOnly must be false for full build
          sed -i '' 's/const val exoOnly = true/const val exoOnly = false/' buildSrc/src/main/kotlin/AppConfig.kt
          # DEBUG must be off
          sed -i '' "s/buildConfigField(\"DEBUG\", true)/buildConfigField(\"DEBUG\", false)/" shared/build.gradle.kts

      # Two Gradle invocations — assembleFullRelease builds the per-ABI APKs
      # (4 splits + 1 universal) with `splits.abi` enabled; bundleFullRelease
      # builds the AAB with splits disabled. Mixing both in one invocation is
      # explicitly unsupported by androidApp/build.gradle.kts (see the comment
      # at `isBuildingBundle`) — splits get switched off and only the universal
      # APK ships, which is the bug that produced a single 115 MB universal in
      # an earlier release. The trade-off is paying configuration twice.
      - name: Build APKs (per-ABI splits + universal)
        run: ./gradlew assembleFullRelease

      - name: Build AAB
        run: ./gradlew bundleFullRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-full-apks
          path: androidApp/build/outputs/apk/full/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: androidApp/build/outputs/bundle/fullRelease/*.aab

  # ───────────────────────────────────────────────────────────────────────────
  # Android ExoOnly Build (exoOnly=true) → 1 universal APK
  # ───────────────────────────────────────────────────────────────────────────
  build-android-exo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore/syncplaykey.jks

      - name: Create local.properties
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          keystore.keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keystore.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keystore.storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          yuroyami.keyKlipyApi=${{ secrets.KLIPY_API_KEY }}
          EOF

      - name: Set exoOnly=true
        run: |
          sed -i 's/const val exoOnly = false/const val exoOnly = true/' buildSrc/src/main/kotlin/AppConfig.kt
          sed -i "s/buildConfigField(\"DEBUG\", true)/buildConfigField(\"DEBUG\", false)/" shared/build.gradle.kts

      - name: Build APK
        run: ./gradlew assembleExoOnlyRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-exo-apk
          path: androidApp/build/outputs/apk/exoOnly/release/*.apk

  # ───────────────────────────────────────────────────────────────────────────
  # iOS Build → Archive + IPA + App Store upload
  # ───────────────────────────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          cat > local.properties <<EOF
          yuroyami.keyKlipyApi=${{ secrets.KLIPY_API_KEY }}
          EOF

      - name: Ensure DEBUG off
        run: |
          sed -i '' "s/buildConfigField(\"DEBUG\", true)/buildConfigField(\"DEBUG\", false)/" shared/build.gradle.kts

      # Stamp the iOS version from the SSOT (kmpSsot.versionName in build.gradle.kts)
      # into the Xcode project BEFORE xcodebuild reads it.
      #
      # The kmp-ssot plugin normally rewrites MARKETING_VERSION/CURRENT_PROJECT_VERSION
      # in the pbxproj, but it does so during the iOS framework *link* task — which runs
      # from the CocoaPods "[CP] Build" script phase partway through the archive. By then
      # Xcode has already read the committed (stale) version and baked it into Info.plist
      # (CFBundleShortVersionString = $(MARKETING_VERSION)). Locally you build twice and
      # commit the rewritten pbxproj, so it self-corrects; a one-shot CI `clean archive`
      # uploads the previous version. Stamping here makes CI authoritative regardless of
      # what's committed.
      - name: Stamp iOS version from SSOT
        id: version
        run: |
          VERSION=$(grep -E '^[[:space:]]+versionName[[:space:]]*=' build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract versionName from build.gradle.kts" >&2
            exit 1
          fi
          VERSION_CODE=$(python3 -c "v='$VERSION'.split('.'); print('1' + ''.join(s.zfill(3) for s in v))")
          PBXPROJ=iosApp/iosApp.xcodeproj/project.pbxproj
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $VERSION;/g" "$PBXPROJ"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $VERSION_CODE;/g" "$PBXPROJ"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "iOS version stamped: $VERSION (build $VERSION_CODE)"

      # CocoaPods caches at three levels:
      # 1. ~/.cocoapods/repos — the trunk spec repo (slow to refresh from CDN)
      # 2. ~/Library/Caches/CocoaPods — downloaded pod sources
      # 3. iosApp/Pods — installed Pods tree, restored as a unit to skip
      #    framework extraction
      #
      # `pod install` always runs (cheap with sources cached) so the generated
      # files inside Pods/ — xcfilelist inputs/outputs, .xcconfig, manifest,
      # Pods.xcodeproj — are regenerated to match the installed CocoaPods/Xcode
      # versions on the runner. Caching `iosApp/Pods` alone and skipping
      # `pod install` is fragile: the cached tree carries over generated
      # artifacts from an older CocoaPods version, and the new Xcode then fails
      # with `Unable to load contents of file list ... .xcfilelist` (which is
      # what blocked the 2026-05-18 release run).
      - name: Cache CocoaPods spec repo
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods/repos
          key: cocoapods-repos-${{ runner.os }}-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            cocoapods-repos-${{ runner.os }}-

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-downloads-${{ runner.os }}-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            cocoapods-downloads-${{ runner.os }}-

      - name: Cache installed Pods
        id: pods-cache
        uses: actions/cache@v4
        with:
          path: iosApp/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('iosApp/Podfile.lock') }}

      # KMP needs a dummy framework on disk before CocoaPods can resolve the
      # `:shared` pod dependency. Cheap (~10s) so we run it unconditionally
      # rather than coupling it to the Pods cache.
      - name: Generate shared framework
        run: ./gradlew :shared:generateDummyFramework

      # Always run pod install so the xcfilelist/xcconfig/manifest under
      # iosApp/Pods/Target Support Files match the runner's current CocoaPods
      # version. With sources cached this is ~30s.
      # --repo-update only on cold start — refreshing the spec repo from CDN
      # is the slow part and not needed when the lock hasn't changed.
      - name: Install CocoaPods dependencies
        working-directory: ./iosApp
        run: |
          if [ "${{ steps.pods-cache.outputs.cache-hit }}" = "true" ]; then
            pod install
          else
            pod install --repo-update
          fi

      - name: Setup App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Archive
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_API_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=B5573QN48P \
            clean archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist .github/workflows/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_API_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID

      - name: Upload to App Store
        if: inputs.deploy_app_store
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/build/*.ipa \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
            --apiPrivateKey ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Rename IPA
        id: ipa
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IPA_SRC=$(ls $RUNNER_TEMP/build/*.ipa | head -1)
          IPA_NAME="synkplay-${VERSION}-ios.ipa"
          cp "$IPA_SRC" "$RUNNER_TEMP/$IPA_NAME"
          echo "ipa_path=$RUNNER_TEMP/$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa_size=$(stat -f%z "$RUNNER_TEMP/$IPA_NAME")" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.ipa.outputs.ipa_path }}

  # ───────────────────────────────────────────────────────────────────────────
  # Create GitHub Release + Upload artifacts + Update AltStore + Play Store
  # ───────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-android-full, build-android-exo, build-ios]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-android-full.outputs.version }}
      VERSION_CODE: ${{ needs.build-android-full.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      # ── Google Play Store ──────────────────────────────────────────────────
      - name: Upload AAB to Google Play
        if: inputs.deploy_play_store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.yuroyami.syncplay
          releaseFiles: artifacts/android-aab/*.aab
          track: beta
          status: completed

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/android-full-apks/*.apk release-files/
          cp artifacts/android-exo-apk/*.apk release-files/
          cp artifacts/ios-ipa/*.ipa release-files/
          echo "Release files:"
          ls -lh release-files/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            release-files/*

      # ── AltStore JSON ──────────────────────────────────────────────────────
      - name: Update AltStore source JSON
        run: |
          IPA_SIZE=$(stat -c%s "release-files/synkplay-${VERSION}-ios.ipa" 2>/dev/null || stat -f%z "release-files/synkplay-${VERSION}-ios.ipa")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")

          jq --arg ver "$VERSION" \
             --arg code "$VERSION_CODE" \
             --arg size "$IPA_SIZE" \
             --arg date "$DATE" \
             --arg url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/synkplay-${VERSION}-ios.ipa" \
             '
             .apps[0].versions = [{
               downloadURL: $url,
               size: ($size | tonumber),
               version: $ver,
               buildVersion: $code,
               date: $date,
               localizedDescription: "",
               minOSVersion: ""
             }] + .apps[0].versions
             ' altstore_yuroyami.json > altstore_tmp.json && mv altstore_tmp.json altstore_yuroyami.json

      - name: Commit AltStore update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore_yuroyami.json
          git diff --cached --quiet && echo "No AltStore changes" || \
            git commit -m "Update AltStore source for v${VERSION}" && git push
