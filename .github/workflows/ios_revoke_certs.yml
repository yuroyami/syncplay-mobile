name: Cleanup Automatic-signing Generated iOS Certificates

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_BASE64:
        required: true

jobs:
  cleanup-certificates:
    runs-on: ubuntu-latest

    steps:
      - name: Revoke ALL distribution certificates
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -e

          echo "⚠️  This will revoke ALL iOS distribution certificates in the team"

          pip install pyjwt cryptography requests --quiet

          python3 << 'EOF'
          import jwt
          import time
          import os
          import requests
          import base64
          import sys

          api_key_id = os.environ['APP_STORE_CONNECT_API_KEY_ID']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          api_key_base64 = os.environ['APP_STORE_CONNECT_API_KEY_BASE64']

          api_key = base64.b64decode(api_key_base64)

          def generate_jwt():
              headers = {
                  'kid': api_key_id,
                  'alg': 'ES256',
                  'typ': 'JWT'
              }
              payload = {
                  'iss': issuer_id,
                  'iat': int(time.time()),
                  'exp': int(time.time()) + 1200,
                  'aud': 'appstoreconnect-v1'
              }
              token = jwt.encode(payload, api_key, algorithm='ES256', headers=headers)
              return token

          token = generate_jwt()

          def revoke_type(cert_type):
              print(f"\n🔍 Listing {cert_type} certificates...")
              list_url = f"https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]={cert_type}"
              headers = {
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json'
              }
              response = requests.get(list_url, headers=headers)
              if response.status_code != 200:
                  print(f"⚠️  Failed to list certificates (HTTP {response.status_code})")
                  print(response.text)
                  return
              data = response.json()
              certificates = data.get('data', [])
              count = len(certificates)
              print(f"Found {count} {cert_type} certificates")
              if count > 0:
                  for cert in certificates:
                      cert_id = cert['id']
                      print(f"🗑️  Revoking certificate: {cert_id}")
                      delete_url = f"https://api.appstoreconnect.apple.com/v1/certificates/{cert_id}"
                      delete_response = requests.delete(delete_url, headers=headers)
                      if delete_response.status_code == 204:
                          print(f"   ✅ Successfully revoked {cert_id}")
                      else:
                          print(f"   ⚠️  Failed to revoke {cert_id} (HTTP {delete_response.status_code})")
                          if delete_response.text:
                              print(f"   {delete_response.text}")
              else:
                  print("   ℹ️  No certificates to revoke")

          try:
              revoke_type("IOS_DISTRIBUTION")
              revoke_type("DEVELOPMENT")
              print("\n✅ Certificate cleanup completed")
          except Exception as e:
              print(f"\n❌ Error during cleanup: {e}")
              sys.exit(1)
          EOF
